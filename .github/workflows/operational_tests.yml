name: Server Status Test

on:
  schedule:
    # 4:43 UTC = 9:43 pm PDT = 8:43 pm PST
    # 10:43 UTC = 3:43 am PDT = 2:43 am PST
    # 16:43 UTC = 9:43 am PDT = 8:43 am PST
    # 22:43 UTC = 3:43 pm PDT = 2:43 pm PST
    # Scheduled tasks may be delayed or skipped under high load.
    - cron: '43 4,10,16,22 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: >-
        -Dorg.gradle.internal.http.connectionTimeout=60000
        -Dorg.gradle.internal.http.socketTimeout=300000

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assemble

      - name: Run operational tests with Gradle
        run: ./gradlew testOperational
